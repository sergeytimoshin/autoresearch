[workspace]
name = "autoresearch"
authors = ["tsv"]
channels = ["conda-forge", "https://conda.modular.com/max-nightly/"]
description = "Single-GPU GPT training in Mojo"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[dependencies]
mojo = "<1.0.0"
python = ">=3.10,<3.14"

[pypi-dependencies]
torch = ">=2.9"
tiktoken = ">=0.11"
rustbpe = ">=0.1"
numpy = ">=2.2"
pyarrow = ">=21"
requests = ">=2.32"
matplotlib = ">=3.10"

[tasks]
train = "mojo run train.mojo"
prepare = "python prepare.py"
plot = "python plot_progress.py"
